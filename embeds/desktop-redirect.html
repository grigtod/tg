    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#f9d006",
              "background-light": "#f8f8f5",
              "background-dark": "#231f0f"
            },
            fontFamily: {
              display: ["Public Sans", "sans-serif"]

            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",

            Experience our industrial and mining solutions optimized for your handheld device.

        </div>

        <div class="flex flex-col items-center p-8 md:p-12">
          <div class="mb-8 rounded-xl border-4 border-primary bg-white p-4 shadow-inner">

            ></div>
          </div>

          <div class="space-y-4 text-center">
            <h3 class="text-xl font-bold">Scan to start exploring</h3>
            <p class="mx-auto max-w-md text-slate-600 dark:text-slate-400">
              Open your phone camera or QR scanner to open <span class="font-semibold text-primary">Discover TG</span> instantly. No installation required for the web preview.
            </p>
          </div>
        </div>
      </div>
    </main>

</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gwarek przy podcieniach</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png" />
    <link rel="apple-touch-icon" href="../apple-touch-icon.png" />
    <link rel="manifest" href="../site.webmanifest" />
    <link rel="stylesheet" href="embeds.css" />
  </head>
  <body>
    <div class="card">
      <h1>🗿 Gwarek przy podcieniach</h1>
      <p class="muted">Another independent embedded page. Different logic can live here.</p>

      <button id="showTimeBtn" type="button">Show current time</button>
      <p id="timeText" class="muted"></p>
    </div>

    <script>
      const timeText = document.getElementById("timeText");
      document.getElementById("showTimeBtn").addEventListener("click", () => {
        timeText.textContent = "Time: " + new Date().toLocaleString();
      });
    </script>
  </body>
</html>
